server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

    # API when this container is opened directly as /test_news/api/...
    location ^~ /test_news/api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /test_news;
        # RAGFlow-генерация (лаборатория промтов) длится до ~360с — не рвём соединение.
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # API when outer nginx strips /test_news/ and forwards /api/...
    location ^~ /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /test_news;
        # RAGFlow-генерация (лаборатория промтов) длится до ~360с — не рвём соединение.
        proxy_connect_timeout 60s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # Mixed Content fix: исходные картинки новостей лежат на http://77.238.253.92:8765/<file>.
    # Страница открывается по HTTPS, поэтому браузер блокирует http-картинки. Бэкенд переписывает
    # link_photo на /test_news/imgproxy/<file> (см. IMAGE_PROXY_PREFIX / INSECURE_IMAGE_HOST),
    # а здесь мы проксируем их на исходный хост — картинки идут с того же origin по HTTPS.
    # ВАЖНО: хост ниже должен совпадать с INSECURE_IMAGE_HOST в backend.
    location ^~ /test_news/imgproxy/ {
        proxy_pass http://77.238.253.92:8765/;
        proxy_set_header Host 77.238.253.92:8765;
        proxy_http_version 1.1;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Та же проксь, если внешний nginx срезает префикс /test_news/.
    location ^~ /imgproxy/ {
        proxy_pass http://77.238.253.92:8765/;
        proxy_set_header Host 77.238.253.92:8765;
        proxy_http_version 1.1;
        proxy_buffering on;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Static assets for direct local check: http://127.0.0.1:6885/test_news/assets/...
    location ^~ /test_news/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html никогда не кэшируем — иначе браузер держит старую разметку,
    # которая ссылается на устаревшие (несуществующие) хеши ассетов, и после
    # деплоя приходится жать Ctrl+F5. Хешированные ассеты выше кэшируются навсегда.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # SPA routes under /test_news/ for direct local check.
    location ^~ /test_news/ {
        try_files $uri $uri/ /index.html;
    }

    # SPA routes when the outer nginx strips /test_news/.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
